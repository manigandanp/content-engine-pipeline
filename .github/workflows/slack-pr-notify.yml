name: Slack PR Notify

on:
  pull_request:
    types: [opened, closed, reopened, synchronize, edited]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review' || github.event_name == 'pull_request_review_comment' || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    steps:
      - name: Send Slack notification
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_STATE: ${{ github.event.review.state }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          # Determine action label, color, and PR metadata source per event type.
          case "$EVENT_NAME" in
            pull_request)
              num="$PR_NUM"
              title="$PR_TITLE"
              url="$PR_URL"
              author="$PR_AUTHOR"
              branch="$PR_BRANCH"
              case "$ACTION" in
                opened)
                  label="PR opened"
                  color="good"
                  ;;
                reopened)
                  label="PR reopened"
                  color="good"
                  ;;
                synchronize)
                  label="PR updated (new commits)"
                  color="warning"
                  ;;
                edited)
                  label="PR edited"
                  color="warning"
                  ;;
                closed)
                  if [[ "$PR_MERGED" == "true" ]]; then
                    label="PR merged"
                    color="good"
                  else
                    label="PR closed"
                    color="danger"
                  fi
                  ;;
                *)
                  label="PR $ACTION"
                  color="warning"
                  ;;
              esac
              ;;
            pull_request_review)
              # NOTE: for pull_request_review events, the review STATE drives the color
              # (approved=green, changes_requested/dismissed=red, commented=yellow), so an
              # edited review keeps the color of its current state.
              num="$PR_NUM"
              title="$PR_TITLE"
              url="$PR_URL"
              author="$PR_AUTHOR"
              branch="$PR_BRANCH"
              case "$REVIEW_STATE" in
                approved)
                  label="PR approved"
                  color="good"
                  ;;
                changes_requested)
                  label="Changes requested"
                  color="danger"
                  ;;
                commented)
                  label="Review comment"
                  color="warning"
                  ;;
                dismissed)
                  label="Review dismissed"
                  color="warning"
                  ;;
                *)
                  label="Review $REVIEW_STATE"
                  color="warning"
                  ;;
              esac
              ;;
            pull_request_review_comment)
              num="$PR_NUM"
              title="$PR_TITLE"
              url="$PR_URL"
              author="$PR_AUTHOR"
              branch="$PR_BRANCH"
              label="New review comment"
              color="warning"
              ;;
            issue_comment)
              num="$ISSUE_NUM"
              # github.event.pull_request is not populated for issue_comment; fetch PR details.
              pr_data=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/pulls/$ISSUE_NUM" || true)
              title=$(echo "$pr_data" | jq -r '.title // empty' || true)
              url=$(echo "$pr_data" | jq -r '.html_url // empty' || true)
              author=$(echo "$pr_data" | jq -r '.user.login // empty' || true)
              branch=$(echo "$pr_data" | jq -r '.head.ref // empty' || true)
              [[ -z "$title" ]] && title="$ISSUE_TITLE"
              [[ -z "$url" ]] && url="$ISSUE_URL"
              [[ -z "$author" ]] && author="$ISSUE_USER"
              [[ -z "$branch" ]] && branch="unknown"
              label="New comment"
              color="warning"
              ;;
          esac

          # For synchronize events, fetch and truncate the commit subject.
          commit_subject=""
          if [[ "$EVENT_NAME" == "pull_request" && "$ACTION" == "synchronize" ]]; then
            commit_data=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/commits/$HEAD_SHA" || true)
            commit_subject=$(echo "$commit_data" | jq -r '.commit.message // empty' | head -n1 || true)
            if [[ "${#commit_subject}" -gt 100 ]]; then
              commit_subject="${commit_subject:0:100}…"
            fi
          fi

          # For comment events, truncate the comment body and replace newlines with spaces.
          comment_user=""
          comment_body=""
          if [[ "$EVENT_NAME" == "issue_comment" || "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            comment_user="$COMMENT_USER"
            comment_body=$(printf '%s' "$COMMENT_BODY" | tr '\n\r' '  ' || true)
            if [[ "${#comment_body}" -gt 280 ]]; then
              comment_body="${comment_body:0:280}…"
            fi
          fi

          # Review state is only shown as a field for pull_request_review events.
          review_state_field=""
          if [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            review_state_field="$REVIEW_STATE"
          fi

          # Ask Masa to review on newly opened PRs and new pushes.
          review_request=""
          if [[ "$EVENT_NAME" == "pull_request" && ("$ACTION" == "opened" || "$ACTION" == "synchronize") ]]; then
            review_request="<@U0AUUSVQUL8> please review this PR"
          fi

          fallback="$label · $REPO#$num"
          attachment_title="PR #$num: $title"
          top_text="PR #$num $title — $label ($REPO)"

          # Build the Slack payload safely with jq so titles/comments with quotes/newlines cannot break JSON.
          PAYLOAD=$(jq -n \
            --arg text "$top_text" \
            --arg fallback "$fallback" \
            --arg color "$color" \
            --arg title "$attachment_title" \
            --arg title_link "$url" \
            --arg author_name "$author" \
            --arg repo "$REPO" \
            --arg branch "$branch" \
            --arg action "$label" \
            --arg author "$author" \
            --arg commit_subject "$commit_subject" \
            --arg comment_user "$comment_user" \
            --arg comment_body "$comment_body" \
            --arg review_state "$review_state_field" \
            --arg review_request "$review_request" \
            '[
              {title: "Repository", value: $repo, short: true},
              {title: "Branch", value: $branch, short: true},
              {title: "Action", value: $action, short: true},
              {title: "Author", value: $author, short: true}
            ]
            + (if $commit_subject != "" then [{title: "Commit", value: $commit_subject, short: false}] else [] end)
            + (if $comment_user != "" then [{title: "Comment by", value: $comment_user, short: true}] else [] end)
            + (if $comment_body != "" then [{title: "Comment", value: $comment_body, short: false}] else [] end)
            + (if $review_state != "" then [{title: "Review state", value: $review_state, short: true}] else [] end)
            | . as $fields
            | {
                text: $text,
                attachments: [
                  {
                    fallback: $fallback,
                    color: $color,
                    title: $title,
                    title_link: $title_link,
                    author_name: $author_name,
                    fields: $fields
                  } + (if $review_request != "" then {text: $review_request} else {} end)
                ]
              }')

          echo "Slack payload:"
          echo "$PAYLOAD" | jq .

          # Post to Slack. A Slack hiccup should not fail the whole workflow.
          set +e
          http_code=$(curl -s -o /tmp/slack_resp.txt -w "%{http_code}" \
            -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL")
          curl_exit=$?
          set -e

          if [[ $curl_exit -ne 0 ]]; then
            echo "Warning: curl to Slack failed with exit code $curl_exit"
          elif [[ "$http_code" != "200" ]]; then
            echo "Warning: Slack returned HTTP $http_code"
            cat /tmp/slack_resp.txt
          elif [[ "$(cat /tmp/slack_resp.txt)" != "ok" ]]; then
            echo "Warning: Slack returned non-ok body:"
            cat /tmp/slack_resp.txt
          else
            echo "Slack notification sent successfully."
          fi
